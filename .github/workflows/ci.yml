name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    # Single matrixed job: each leg runs exactly one test type. Integration
    # tests use testcontainers, which spins up its own postgres:16 container,
    # so no GitHub-managed `services:` block is needed (and none is declared).
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit tests
            matrix: unit
          - name: Integration tests
            matrix: integration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e '.[test,postgres]'

      - name: Run unit tests
        if: matrix.matrix == 'unit'
        run: |
          uv run pytest tests/unit

      - name: Run integration tests
        if: matrix.matrix == 'integration'
        run: |
          uv run pytest tests/integration
