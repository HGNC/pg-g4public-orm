name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Unit tests
            matrix: unit
          - name: Integration tests
            matrix: integration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv pip install -e .[test,postgres]

      - name: Run tests
        run: |
          uv run pytest tests/unit

      - name: Run integration tests
        if: matrix.matrix == 'integration'
        run: |
          uv run pytest tests/integration

  integration:
    needs: ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports: ['5432']
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv pip install -e .[test,postgres]

      - name: Run integration tests
        run: |
          uv run pytest tests/integration