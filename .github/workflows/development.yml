name: Development

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          uv pip install -e .[dev]

      - name: Run black
        run: |
          uv run black --check src/ tests/

      - name: Run ruff
        run: |
          uv run ruff check src/ tests/